name: Build Docker Hub image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish"
        required: false
        default: "0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/runpod-nemotron-ocr:${{ github.event.inputs.tag || github.ref_name }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/runpod-nemotron-ocr:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
